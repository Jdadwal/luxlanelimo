<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Luxlane Limo</title>
  <meta name="robots" content="noindex" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet" href="assets/css/admin.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='16' fill='%23c9a84c'/><text x='16' y='22' text-anchor='middle' font-size='18' font-weight='bold' fill='black'>L</text></svg>">
</head>
<body>

<!-- LOGIN -->
<div class="admin-login" id="adminLogin">
  <div class="admin-login-card">
    <div class="logo-icon" style="width:56px;height:56px;font-size:1.5rem;margin:0 auto 18px;">L</div>
    <h1 style="text-align:center;font-size:1.5rem;margin-bottom:6px;">Admin Dashboard</h1>
    <p style="text-align:center;color:var(--gray);font-size:0.85rem;margin-bottom:26px;">Sign in to manage bookings</p>
    <form id="adminLoginForm">
      <div class="form-group" style="margin-bottom:16px;">
        <label class="form-label">Admin Password</label>
        <input class="form-control" id="adminPassword" type="password" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button class="btn btn-primary btn-lg" type="submit" style="width:100%;justify-content:center;">Sign In</button>
    </form>
    <p style="text-align:center;font-size:0.72rem;color:var(--gray-dark);margin-top:18px;">Set <code>ADMIN_PASSWORD</code> in your server environment to secure this.</p>
  </div>
</div>

<!-- DASHBOARD -->
<div class="admin-app" id="adminApp" style="display:none;">
  <header class="admin-header">
    <div class="admin-brand"><div class="logo-icon" style="width:34px;height:34px;font-size:1rem;">L</div> LUXLANE <span style="color:var(--gray);font-weight:400;">Admin</span></div>
    <div style="display:flex;gap:10px;align-items:center;">
      <button class="btn btn-dark btn-sm" id="adminRefresh">↻ Refresh</button>
      <button class="btn btn-outline btn-sm" id="adminLogout">Sign Out</button>
    </div>
  </header>

  <div class="admin-body">
    <!-- STATS -->
    <div class="admin-stats" id="adminStats"></div>

    <!-- FILTERS -->
    <div class="admin-toolbar">
      <div class="admin-filters" id="adminFilters"></div>
      <input class="form-control admin-search" id="adminSearch" type="text" placeholder="Search ref, name, location…" />
    </div>

    <!-- BOOKINGS -->
    <div id="adminList"></div>
  </div>
</div>

<script src="assets/js/admin.js"></script>
</body>
</html>
