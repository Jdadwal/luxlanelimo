<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Track Your Ride — Luxlane</title>
  <meta name="theme-color" content="#0a0a0a" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet" href="assets/css/track.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='16' fill='%23c9a84c'/><text x='16' y='22' text-anchor='middle' font-size='18' font-weight='bold' fill='black'>L</text></svg>">
</head>
<body>
<div class="track-app">

  <!-- HEADER -->
  <div class="track-header">
    <a class="track-back" href="trips.html" title="Back to trips">‹</a>
    <div class="ref">Tracking ride<b id="trackRef">—</b></div>
    <div class="live-dot"><span class="blip"></span> Live</div>
  </div>

  <!-- LIVE MAP -->
  <div class="track-map">
    <svg viewBox="0 0 520 300" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="streets" width="40" height="40" patternUnits="userSpaceOnUse">
          <rect width="40" height="40" fill="#0d0f12"/>
          <path d="M0 0H40M0 0V40" stroke="#16191e" stroke-width="1"/>
        </pattern>
      </defs>
      <rect width="520" height="300" fill="url(#streets)"/>
      <!-- a few decorative "blocks" -->
      <g fill="#12151a">
        <rect x="40" y="40" width="90" height="60" rx="4"/>
        <rect x="170" y="30" width="70" height="80" rx="4"/>
        <rect x="300" y="50" width="110" height="50" rx="4"/>
        <rect x="70" y="180" width="100" height="70" rx="4"/>
        <rect x="230" y="190" width="80" height="60" rx="4"/>
        <rect x="370" y="170" width="90" height="80" rx="4"/>
      </g>

      <!-- route path (base + traveled overlay) -->
      <path id="routeBase" d="M70 240 C 160 210, 150 110, 250 120 S 380 90, 450 60"
            fill="none" stroke="#2a2f37" stroke-width="6" stroke-linecap="round"/>
      <path id="routeProg" d="M70 240 C 160 210, 150 110, 250 120 S 380 90, 450 60"
            fill="none" stroke="#c9a84c" stroke-width="6" stroke-linecap="round"/>

      <!-- pins -->
      <g id="startPin" transform="translate(70,240)">
        <circle r="9" fill="#0a0a0a" stroke="#c9a84c" stroke-width="3"/>
        <circle r="3" fill="#c9a84c"/>
      </g>
      <g id="endPin" transform="translate(450,60)">
        <circle r="10" fill="#c9a84c"/>
        <text x="0" y="4" text-anchor="middle" font-size="11" fill="#0a0a0a">🏁</text>
      </g>

      <!-- car marker -->
      <g id="carMarker" class="car-marker" transform="translate(70,240)">
        <g class="car-bubble" transform="translate(-15,-15)">
          <circle cx="15" cy="15" r="15" fill="#0a0a0a" stroke="#c9a84c" stroke-width="2"/>
          <text x="15" y="20" text-anchor="middle" font-size="15">🚘</text>
        </g>
      </g>
    </svg>
  </div>

  <!-- BODY -->
  <div class="track-body">

    <!-- waiting (no driver yet) -->
    <div class="eta-card track-waiting" id="waitingCard" style="display:none;">
      <div class="eta-status">⏳ Finding your chauffeur…</div>
      <div class="text-gray" style="font-size:0.85rem;">We're assigning a professional driver to your ride. This page will update automatically.</div>
    </div>

    <!-- live status -->
    <div class="eta-card" id="etaCard" style="display:none;">
      <div class="eta-status" id="etaStatus">Connecting…</div>
      <div class="eta-num"><span id="etaNum">—</span> <small id="etaUnit">min away</small></div>
      <div class="eta-prog"><div class="bar" id="etaBar"></div></div>
    </div>

    <!-- completed -->
    <div class="eta-card track-done" id="doneCard" style="display:none;">
      <div class="ic">🎉</div>
      <div class="eta-status">You've <span class="em">arrived</span>!</div>
      <div class="text-gray" style="font-size:0.85rem;">Thank you for riding with Luxlane. We hope to see you again soon.</div>
    </div>

    <!-- driver -->
    <div class="driver-card" id="driverCard">
      <div class="driver-avatar" id="driverAvatar">…</div>
      <div class="driver-info">
        <div class="name" id="driverName">Assigning chauffeur…</div>
        <div class="meta" id="driverMeta">—</div>
        <span class="plate" id="driverPlate" style="display:none;"></span>
      </div>
      <a class="driver-call disabled" id="driverCall" href="#" title="Call chauffeur">📞</a>
    </div>

    <!-- route -->
    <div class="route-detail">
      <div class="row">
        <div style="display:flex;flex-direction:column;align-items:center;">
          <span class="pin">📍</span><span class="line"></span><span class="pin">🏁</span>
        </div>
        <div>
          <div class="addr"><small id="startLabel">Pick-up</small><span id="trackPickup">—</span></div>
          <div class="addr"><small id="endLabel">Destination</small><span id="trackDropoff">—</span></div>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="assets/js/track.js"></script>
</body>
</html>
